<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WELCOME TO MY Portfolio</title>
    <style>
        /* 1. Global Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', serif; /* Royal touch font */
            background-color: #002366; /* Deep Royal Blue */
            color: #D4AF37; /* Gold Color */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 2. Navigation Styling (Center and Clean) */
        nav {
            width: 100%;
            padding: 30px 0;
            background: rgba(0, 0, 0, 0.2); /* Subtle dark overlay */
            text-align: center;
            border-bottom: 2px solid #D4AF37; /* Gold border */
        }

        nav a {
            color: #D4AF37;
            text-decoration: none;
            margin: 0 25px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #FFFFFF;
            text-shadow: 0 0 10px #D4AF37;
        }

        /* 3. Main Content Styling */
        .hero {
            margin-top: 120px;
            text-align: center;
            max-width: 900px;
            padding: 20px;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            color: #D4AF37;
        }

        p {
            font-size: 1.3rem;
            color: #f0e68c; /* Khaki/Light Gold */
            margin-bottom: 40px;
        }

        /* 4. Action Button */
        .cta-button {
            display: inline-block;
            background-color: #D4AF37;
            color: #002366;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.4s ease;
        }

        .cta-button:hover {
            background-color: #FFFFFF;
            color: #002366;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <!-- Professional Navigation links -->
    <nav>
        <a href="/">Home</a>
        <a href="/about">About Me</a>
        <a href="/projects">Projects</a>
        <a href="/contact">Contact</a>
    </nav>

    <!-- Content Area -->
    <div class="hero">
        <h1>WELCOME TO MY PORTFOLIO</h1>
        <p>Expert in Python Backend & Professional Web Development</p>
        <a href="/projects" class="cta-button">EXPLORE MY WORK</a>
    </div>

</body>
</html>
