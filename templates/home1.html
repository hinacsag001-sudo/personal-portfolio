<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Viewport meta tag ensures proper scaling on all screen sizes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELCOME TO MY Portfolio</title>
    <style>
        /* =============================================
           1. GLOBAL STYLES
           Reset margins/padding, use border-box sizing
        ============================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', serif; /* Royal touch font */
            background-color: #002366;     /* Deep Royal Blue */
            color: #D4AF37;                /* Gold text color */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* =============================================
           2. NAVIGATION
           Flexbox layout so links wrap on small screens
        ============================================= */
        nav {
            width: 100%;
            padding: 20px 15px;
            background: rgba(0, 0, 0, 0.2); /* Subtle dark overlay */
            border-bottom: 2px solid #D4AF37; /* Gold bottom border */
            display: flex;
            flex-wrap: wrap;               /* Wrap links on narrow screens */
            justify-content: center;
            gap: 10px;
        }

        nav a {
            color: #D4AF37;
            text-decoration: none;
            padding: 8px 16px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            white-space: nowrap;           /* Prevent individual link text wrapping */
        }

        nav a:hover {
            color: #FFFFFF;
            text-shadow: 0 0 10px #D4AF37;
        }

        /* =============================================
           3. HERO SECTION
           Centered welcome text and tagline
        ============================================= */
        .hero {
            margin-top: 80px;
            text-align: center;
            max-width: 900px;
            padding: 20px 15px;           /* Horizontal padding for small screens */
        }

        h1 {
            /* clamp() scales font between 2rem (mobile) and 4rem (desktop) */
            font-size: clamp(2rem, 6vw, 4rem);
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            color: #D4AF37;
        }

        p {
            /* clamp() scales font between 1rem (mobile) and 1.3rem (desktop) */
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: #f0e68c; /* Khaki / Light Gold */
            margin-bottom: 40px;
        }

        /* =============================================
           4. CALL-TO-ACTION BUTTON
           Pill-shaped gold button linking to projects
        ============================================= */
        .cta-button {
            display: inline-block;
            background-color: #D4AF37;
            color: #002366;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.4s ease;
        }

        .cta-button:hover {
            background-color: #FFFFFF;
            color: #002366;
            transform: scale(1.1);
        }

        /* =============================================
           5. MOBILE-SPECIFIC OVERRIDES
           Extra tweaks for screens narrower than 480px
        ============================================= */
        @media (max-width: 480px) {
            .hero {
                margin-top: 40px;
            }

            .cta-button {
                padding: 12px 28px;        /* Slightly smaller button on phones */
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <!-- ── Navigation Bar ────────────────────────────── -->
    <!-- Links to all major pages of the portfolio -->
    <nav>
        <a href="/">Home</a>
        <a href="/about">About Me</a>
        <a href="/projects">Projects</a>
        <a href="/contact">Contact</a>
    </nav>

    <!-- ── Hero / Welcome Section ────────────────────── -->
    <!-- Main greeting displayed on the landing page -->
    <div class="hero">
        <h1>WELCOME TO MY PORTFOLIO</h1>
        <p>Expert in Python Backend &amp; Professional Web Development</p>
        <!-- CTA button takes the visitor straight to the projects page -->
        <a href="/projects" class="cta-button">EXPLORE MY WORK</a>
    </div>

</body>
</html>
