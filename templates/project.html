<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Projects | Royal Portfolio</title>
    <style>
        /* Global & Royal Theme */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background-color: #002366;
            color: #D4AF37;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            width: 100%;
            padding: 25px 0;
            background: rgba(0, 0, 0, 0.3);
            text-align: center;
            border-bottom: 2px solid #D4AF37;
        }
        nav a {
            color: #D4AF37;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }
        nav a:hover { color: #FFFFFF; }

        /* Filter Section */
        .filter-section {
            margin: 40px 0;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .filter-btn {
            background: transparent;
            border: 1px solid #D4AF37;
            color: #D4AF37;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #D4AF37;
            color: #002366;
        }

        /* Project Grid */
        .container { max-width: 1100px; width: 90%; margin-bottom: 50px; }
        h1 { text-align: center; margin-top: 40px; font-size: 2.5rem; }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 12px;
            padding: 25px;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .project-card:hover {
            transform: translateY(-8px);
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.1);
        }

        .category-tag {
            font-size: 0.75rem;
            color: #002366;
            background: #D4AF37;
            padding: 4px 10px;
            border-radius: 15px;
            align-self: flex-start;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .project-card h3 { color: white; margin-bottom: 10px; }
        .project-card p { color: #f0e68c; font-size: 0.95rem; line-height: 1.4; }
    </style>
</head>
<body>

    <nav>
        <a href="/">Home</a>
        <a href="/about">About Me</a>
        <a href="/projects">Projects</a>
        <a href="/contact">Contact</a>
    </nav>

    <div class="container">
        <h1>PROJECT PORTFOLIO</h1>

        <!-- DYNAMIC CATEGORY FILTERS -->
        <div class="filter-section">
            <a href="/projects" class="filter-btn">All Projects</a>
            {% for cat in categories %}
                <a href="/projects?cat={{ cat }}" class="filter-btn">{{ cat }}</a>
            {% endfor %}
        </div>

        <!-- DYNAMIC PROJECT CARDS -->
        <div class="project-grid">
            {% if projects %}
                {% for proj in projects %}
                <div class="project-card">
                    <div>
                        <span class="category-tag">{{ proj.category }}</span>
                        <h3>{{ proj.title }}</h3>
                        <p>{{ proj.description }}</p>
                    </div>
                </div>
                {% endfor %}
            {% else %}
                <p style="text-align: center; width: 100%;">No projects found in this category.</p>
            {% endif %}
        </div>
    </div>

</body>
</html>
