<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Hina Ali | Royal Portfolio</title>
    <style>
        /* 1. Global & Royal Theme */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', serif;
            background-color: #002366; /* Royal Blue */
            color: #D4AF37; /* Gold */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 2. Navigation */
        nav {
            width: 100%;
            padding: 25px 0;
            background: rgba(0, 0, 0, 0.3);
            text-align: center;
            border-bottom: 2px solid #D4AF37;
        }

        nav a {
            color: #D4AF37;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        nav a:hover { color: #FFFFFF; }

        /* 3. Contact Form Container */
        .contact-container {
            max-width: 600px;
            width: 90%;
            margin: 60px 20px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #D4AF37;
        }

        p.subtitle {
            color: #f0e68c;
            margin-bottom: 30px;
            font-style: italic;
        }

        /* 4. Form Styling */
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid #D4AF37;
            border-radius: 8px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: #FFFFFF;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        /* 5. Gold Send Button */
        .send-btn {
            background-color: #D4AF37;
            color: #002366;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            margin-top: 10px;
        }

        .send-btn:hover {
            background-color: #FFFFFF;
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>
<body>

    <nav>
        <a href="/">Home</a>
        <a href="/about">About Me</a>
        <a href="/projects">Projects</a>
        <a href="/contact">Contact</a>
    </nav>

    <div class="contact-container">
        <h1>GET IN TOUCH</h1>
        <p class="subtitle">I'd love to hear from you!</p>

        <!-- Form linked to your Flask route -->
        <form action="/contact" method="POST">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name..." required>
            </div>

            <div class="form-group">
                <label for="message">Your Message</label>
                <textarea id="message" name="message" rows="5" placeholder="How can I help you?" required></textarea>
            </div>

            <button type="submit" class="send-btn">Send Message</button>
        </form>
    </div>

</body>
</html>
